name: Build Android APK
on: [push]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: Prepare Web & Install
        run: |
          mkdir -p www
          cp index.html www/
          npm install
          npx cap add android
      
      - name: Inyectar Permisos (Método Infalible Node.js)
        run: |
          cat << 'EOF' > fix-perms.js
          const fs = require('fs');
          const file = 'android/app/src/main/AndroidManifest.xml';
          let data = fs.readFileSync(file, 'utf8');
          const perms = '\n    <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />\n';
          data = data.replace('</manifest>', perms + '</manifest>');
          data = data.replace('<application', '<application android:requestLegacyExternalStorage="true"');
          fs.writeFileSync(file, data);
          console.log('Permisos inyectados con éxito en el AndroidManifest.');
          EOF
          node fix-perms.js
      
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - name: Build APK
        run: |
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PurgeOS-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
