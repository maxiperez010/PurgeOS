<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PurgeOS Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #030305; --surface: rgba(18, 18, 22, 0.85); --cerulean: #00d2ff; --orange: #ff5500; --text-main: #ffffff; --text-dim: #666670; --border: rgba(255, 255, 255, 0.08); --danger: #ff3b30; }
        body { margin: 0; font-family: -apple-system, system-ui, sans-serif; background-color: var(--bg); color: var(--text-main); overflow: hidden; -webkit-font-smoothing: antialiased; }
        .hero { padding: 60px 20px 30px; display: flex; flex-direction: column; align-items: center; background: radial-gradient(circle at 50% 0%, rgba(0, 210, 255, 0.08) 0%, transparent 60%); }
        .core-display { width: 160px; height: 160px; display: flex; align-items: center; justify-content: center; border-radius: 50%; border: 2px solid var(--cerulean); box-shadow: 0 0 20px rgba(0, 210, 255, 0.2); }
        .core-pct { font-size: 42px; font-weight: 800; }
        .scroll-area { padding: 0 25px 100px; height: calc(100vh - 280px); overflow-y: auto; }
        .card { background: var(--surface); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-top: 20px; display: flex; align-items: center; gap: 15px; cursor: pointer; }
        .card-icon { width: 46px; height: 46px; border-radius: 14px; display: flex; align-items: center; justify-content: center; background: #000; color: var(--orange); border: 1px solid var(--border); }
        #reviewScreen { position: fixed; inset: 0; background: #030305; z-index: 2000; display: flex; flex-direction: column; opacity: 0; visibility: hidden; transition: 0.4s; }
        #reviewScreen.active { opacity: 1; visibility: visible; }
        .gallery-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; padding: 10px; overflow-y: auto; flex: 1; }
        .gallery-item { position: relative; aspect-ratio: 1; overflow: hidden; border-radius: 8px; border: 2px solid transparent; }
        .gallery-item.selected { border-color: var(--danger); opacity: 0.6; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; }
        .bottom-bar { padding: 20px 25px 40px; background: #030305; }
        .btn-purge { width: 100%; padding: 18px; border-radius: 16px; border: none; background: var(--danger); color: white; font-weight: 800; text-transform: uppercase; }
        #scanner { position: fixed; inset: 0; background: var(--bg); z-index: 3000; display: none; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <div id="scanner"><h2 style="letter-spacing:2px; font-size:12px;">ANALIZANDO MEMORIA REAL...</h2></div>
    <section class="hero"><div class="core-display"><div class="core-pct">84%</div></div></section>
    <div class="scroll-area">
        <div class="card" onclick="startProScan()">
            <div class="card-icon"><i class="fas fa-bolt"></i></div>
            <div class="card-body"><div class="card-title">Escaneo Profundo</div><div class="card-meta">Detección y borrado real</div></div>
        </div>
    </div>
    <div id="reviewScreen">
        <div style="padding:20px; font-size:11px; font-weight:800; border-bottom:1px solid var(--border)">MEMORIA DISPOSITIVO</div>
        <div class="gallery-grid" id="grid"></div>
        <div class="bottom-bar"><button id="mainBtn" class="btn-purge" onclick="executeRealDelete()">PURGAR AHORA</button></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@capacitor/core@5.0.0/dist/capacitor.global.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@capacitor/filesystem@5.0.0/dist/plugin.min.js"></script>

    <script>
        const { Filesystem } = capacitorExports;
        let filesToDelete = [];

        async function startProScan() {
            try {
                // 1. Pedir permisos nativos
                await Filesystem.requestPermissions();
                document.getElementById('scanner').style.display = 'flex';

                // 2. Leer la carpeta de la cámara
                const result = await Filesystem.readdir({
                    path: 'DCIM/Camera',
                    directory: 'EXTERNAL_STORAGE'
                });

                const grid = document.getElementById('grid');
                grid.innerHTML = '';
                filesToDelete = result.files.slice(0, 15); // Tomamos 15 para la prueba

                // 3. Mostrar fotos REALES usando convertFileSrc
                filesToDelete.forEach((file, index) => {
                    const div = document.createElement('div');
                    div.className = 'gallery-item selected';
                    // Convertimos la ruta nativa en una URL que el HTML sí puede mostrar
                    const webUrl = capacitorExports.Capacitor.convertFileSrc(file.uri);
                    div.innerHTML = `<img src="${webUrl}">`;
                    grid.appendChild(div);
                });

                setTimeout(() => {
                    document.getElementById('scanner').style.display = 'none';
                    document.getElementById('reviewScreen').classList.add('active');
                }, 1500);

            } catch (e) {
                document.getElementById('scanner').style.display = 'none';
                alert("AVISO: Si no ves fotos, asegúrate de dar permiso de 'Acceso a todos los archivos' en los ajustes de tu celular para esta App.");
            }
        }

        async function executeRealDelete() {
            if(!confirm("¿Estás seguro? Esto borrará las fotos de tu celular de verdad.")) return;
            
            document.getElementById('mainBtn').innerText = "BORRANDO...";
            
            for (let file of filesToDelete) {
                try {
                    await Filesystem.deleteFile({
                        path: `DCIM/Camera/${file.name}`,
                        directory: 'EXTERNAL_STORAGE'
                    });
                } catch (err) {
                    console.log("Error borrando: " + file.name);
                }
            }

            alert("Purga completada. Los archivos han sido eliminados.");
            location.reload();
        }
    </script>
</body>
</html>
