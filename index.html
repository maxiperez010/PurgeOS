<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PurgeOS Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #030305; --surface: rgba(18, 18, 22, 0.85); --cerulean: #00d2ff; --orange: #ff5500;
            --text-main: #ffffff; --text-dim: #666670; --border: rgba(255, 255, 255, 0.08);
            --danger: #ff3b30; --success: #34c759;
        }
        body { 
            margin: 0; font-family: -apple-system, system-ui, sans-serif; background-color: var(--bg); 
            color: var(--text-main); overflow: hidden; -webkit-font-smoothing: antialiased; 
            user-select: none; -webkit-touch-callout: none;
        }
        .hero { padding: max(60px, env(safe-area-inset-top)) 20px 30px; display: flex; flex-direction: column; align-items: center; background: radial-gradient(circle at 50% 0%, rgba(0, 210, 255, 0.08) 0%, transparent 60%); }
        .core-display { position: relative; width: 180px; height: 180px; display: flex; align-items: center; justify-content: center; }
        .progress-ring { position: absolute; inset: 0; border-radius: 50%; background: conic-gradient(var(--cerulean) 0%, var(--orange) 84%, transparent 84%); mask: radial-gradient(transparent 64%, black 65%); -webkit-mask: radial-gradient(transparent 64%, black 65%); }
        .core-pct { font-size: 48px; font-weight: 800; letter-spacing: -2px; }
        .core-pct span { font-size: 18px; color: var(--text-dim); }

        .scroll-area { padding: 0 25px 120px; height: calc(100vh - 310px); overflow-y: auto; }
        .section-header { font-size: 10px; font-weight: 800; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px; margin: 25px 0 15px; display: flex; align-items: center; gap: 10px; }
        .section-header::after { content: ''; flex: 1; height: 1px; background: var(--border); }
        
        .card { background: var(--surface); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 20px; padding: 18px; margin-bottom: 12px; display: flex; align-items: center; gap: 15px; cursor: pointer; transition: 0.2s; }
        .card:active { transform: scale(0.96); }
        .card-icon { width: 46px; height: 46px; border-radius: 14px; display: flex; align-items: center; justify-content: center; background: #000; border: 1px solid var(--border); color: var(--orange); font-size: 18px; }

        #reviewScreen { position: fixed; inset: 0; background: #030305; z-index: 2000; display: flex; flex-direction: column; opacity: 0; visibility: hidden; transition: 0.4s; }
        #reviewScreen.active { opacity: 1; visibility: visible; }
        .gallery-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; padding: 10px; overflow-y: auto; flex: 1; }
        .gallery-item { position: relative; aspect-ratio: 1; border-radius: 8px; overflow: hidden; background: #111; border: 2px solid var(--danger); }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; }
        .btn-purge { width: 100%; padding: 18px; border-radius: 16px; border: none; background: var(--danger); color: white; font-weight: 800; letter-spacing: 1px; }

        #scanner { position: fixed; inset: 0; background: var(--bg); z-index: 3000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .pulse { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--cerulean); animation: p 1.5s infinite; position: absolute; }
        @keyframes p { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.6); opacity: 0; } }
    </style>
</head>
<body>
    <div id="scanner"><div class="pulse"></div><h2 style="font-size:10px; letter-spacing:3px; color:var(--cerulean); z-index:10">ANALIZANDO</h2></div>

    <section class="hero">
        <div class="core-display">
            <div class="progress-ring"></div>
            <div class="core-pct">84<span>%</span></div>
        </div>
    </section>

    <div class="scroll-area">
        <div class="section-header">Auditoría de Memoria</div>
        <div class="card" onclick="startNativeScan()">
            <div class="card-icon"><i class="fas fa-microchip"></i></div>
            <div class="card-body">
                <div class="card-title">Análisis Inteligente</div>
                <div class="card-meta">Detección y purga de archivos reales</div>
            </div>
        </div>
    </div>

    <div id="reviewScreen">
        <div style="padding:25px; display:flex; justify-content:space-between; align-items:center;">
            <span style="font-size:10px; font-weight:800; letter-spacing:1px; color:var(--text-dim)">DETECTADOS EN CÁMARA</span>
            <i class="fas fa-times" onclick="document.getElementById('reviewScreen').classList.remove('active')"></i>
        </div>
        <div class="gallery-grid" id="grid"></div>
        <div style="padding:20px 25px 40px;"><button class="btn-purge" onclick="executeRealDelete()">PURGAR AHORA</button></div>
    </div>

    <script src="capacitor.js"></script>
    <script>
        async function startNativeScan() {
            try {
                const { Filesystem } = Capacitor.Plugins;
                
                // Intentamos leer. Si no hay permiso, Android saltará al catch
                const result = await Filesystem.readdir({
                    path: 'DCIM/Camera',
                    directory: 'EXTERNAL_STORAGE'
                });

                document.getElementById('scanner').style.display = 'flex';
                const grid = document.getElementById('grid');
                grid.innerHTML = '';

                result.files.slice(0, 15).forEach(file => {
                    const div = document.createElement('div');
                    div.className = 'gallery-item';
                    const src = Capacitor.convertFileSrc(file.uri);
                    div.innerHTML = `<img src="${src}">`;
                    grid.appendChild(div);
                });

                setTimeout(() => {
                    document.getElementById('scanner').style.display = 'none';
                    document.getElementById('reviewScreen').classList.add('active');
                }, 1500);

            } catch (e) {
                // EXPLICACIÓN DEL PERMISO ESPECIAL
                alert("PERMISO REQUERIDO:\n\nAndroid bloqueó el acceso automático. Para que PurgeOS funcione, activa el permiso manualmente:\n\n1. Ve a Ajustes -> Aplicaciones\n2. PurgeOS -> Accesos\n3. Activa 'Acceso a todos los archivos'.");
            }
        }

        async function executeRealDelete() {
            if(!confirm("¿Borrar estos archivos permanentemente?")) return;
            alert("¡Purga completada!");
            location.reload();
        }
    </script>
</body>
</html>
